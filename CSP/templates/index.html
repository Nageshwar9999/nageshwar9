<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Notifier App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f4f4f4;
        }
        .header {
            background-color: yellow;
            color: red;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .container {
            margin-top: 100px;
        }
        .card {
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            background: white;
        }
        .btn-green {
            background-color: green;
            color: white;
            width: 100%;
        }
        .btn-green:hover {
            background-color: #218838;
        }
        .message {
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        Electricity Power Notifier
    </div>

    <div class="container">
        <div class="row">
            <!-- Add Phone Number Form -->
            <div class="col-md-6">
                <div class="card">
                    <h3 class="text-center">Add Phone Number</h3>
                    <form action="/" method="POST">
                        <input type="hidden" name="add_phone" value="1">
                        <div class="mb-3">
                            <label class="form-label">City:</label>
                            <input type="text" name="city" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number:</label>
                            <input type="text" name="phone_number" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-green">Add Phone Number</button>
                    </form>
                </div>
            </div>

            <!-- Send SMS Form -->
            <div class="col-md-6">
                <div class="card">
                    <h3 class="text-center">Send SMS</h3>
                    <form action="/" method="POST">
                        <div class="mb-3">
                            <label class="form-label">City:</label>
                            <input type="text" name="city" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message:</label>
                            <textarea name="message" class="form-control" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-green">Send Message</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Display Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="message" style="color: {% if category == 'success' %}green{% elif category == 'danger' %}red{% else %}orange{% endif %};">
                    <p>{{ message }}</p>
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}
    </div>

</body>
</html>
